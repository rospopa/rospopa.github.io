<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Pavlo Rospopa Website</title>
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="pavlo@rospopa.com">
    <link rel="canonical" href="http://rospopa.github.io/">
    
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/css/favicons/unnamed-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/css/favicons/unnamed-32x32.png">

    <link href="/feed.xml" type="application/atom+xml" rel="alternate" title="Pavlo Rospopa Website" />
    
    <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/css/bootstrap.min.css'>
    <link rel="stylesheet" href="css/format.css">
    
    <style>
        /* --- 1. TYPOGRAPHY & TABLE STYLING --- */
        table.results tbody tr td:nth-of-type(1) { font-weight: bold; }
        
        table.results tbody tr.dynamic-grey > td {
            background-color: #f5f5f7 !important;
            box-shadow: inset 0 0 0 9999px rgba(224, 224, 224, 1) !important;
        }

        table.results tbody tr.active-hover > td {
            background-color: #ffff99 !important;
            cursor: pointer;
        }

        .no-result { display: none; }
        table.results { border-collapse: separate !important; border-spacing: 0; }

        .table-bordered, .table-bordered > tbody > tr > td {
            border-color: #555555 !important;
        }
        
        /* Matching the blog wrap style */
        .wrap { max-width: 800px; margin: 0 auto; padding: 0 20px; }
    </style>
</head>
   
<body>
<header class="site-header">
    <div class="wrap">
        <a class="site-title" style="text-decoration: none;" href="https://rospopa.com">Pavlo Rospopa Website</a>
        <nav class="site-nav">
            <div class="trigger">
                <a style="text-decoration: none;" href="mailto:pavlo@rospopa.com?subject=rospopa.github.io">pavlo@rospopa.com</a>
            </div>
        </nav>
    </div>
</header>

<main>
<div class="page-content">
    <div class="wrap">
        <div class="home">
            <h2 style="margin-top: 40px;">Blog Archive</h2>
            <hr>
            
            <div class="form-group pull-right">
                <input type="text" class="search form-control" placeholder="Search posts...">
            </div>
            <span class="counter pull-right"></span>

            <table class="table table-hover table-bordered results" id="toolsTable">
                <thead>
                    <tr class="warning no-result">
                        <td colspan="3"><i class="fa fa-warning"></i> No result found</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td>May 14th, 2026</td>
                        <td>
                            <a href="blog-post-1/blog-post-1.html" style="color: #6F00B9; font-weight: bold;">
                                2026 National Industrial Investment Midyear Outlook: Key Takeaways for Investors
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>

<br><br><br>

<footer>
    <div class="wrap">
        <div style="text-align:center; border-top: 1px solid #eee; padding-top: 20px;">
            <p>Copyright © <span id="currentYear"></span> All Rights Reserved.</p>
            <script>document.getElementById('currentYear').textContent = new Date().getFullYear();</script>
        </div>
    </div>
</footer>

<script src='//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
<script>
    $(window).on('load', function() {
        function reapplyStriping() {
            $('.results tbody tr').removeClass('dynamic-grey');
            var visibleRows = $('.results tbody tr').not('.warning').filter(':visible');
            visibleRows.each(function(index) {
                if (index % 2 !== 0) { $(this).addClass('dynamic-grey'); }
            });
        }

        reapplyStriping();

        $(".search").keyup(function () {
            var searchTerm = $(".search").val().toLowerCase();
            var noResult = $('.no-result');
            var matchCount = 0;
            var rows = $('.results tbody tr').not('.warning');

            rows.each(function() {
                var row = $(this);
                if (row.text().toLowerCase().indexOf(searchTerm) === -1) {
                    row.hide();
                } else {
                    row.show();
                    matchCount++;
                }
            });

            matchCount === 0 ? noResult.show() : noResult.hide();
            reapplyStriping();
        });
    });
</script>
</body>
</html>
