<script>
    $(window).on('load', function() {
        
        function reapplyStriping() {
            $('.results tbody tr').removeClass('dynamic-grey');
            var visibleRows = $('.results tbody tr').not('.warning').filter(':visible');
            visibleRows.each(function(index) {
                if (index % 2 !== 0) {
                    $(this).addClass('dynamic-grey');
                }
            });
        }

        reapplyStriping();

        var table = $('#toolsTable');
        table.hide();
        setTimeout(function(){
            table.show(); 
        }, 10); 

        $('.results tbody tr').not('.warning').hover(
            function() { $(this).addClass('active-hover'); },
            function() { $(this).removeClass('active-hover'); }
        );

        $(".search").keyup(function () {
            var searchTerm = $(".search").val().toLowerCase();
            var noResult = $('.no-result');
            noResult.hide();
            var matchCount = 0;
            var rows = $('.results tbody tr').not('.warning');

            rows.each(function() {
                var row = $(this);
                if (row.text().toLowerCase().indexOf(searchTerm) === -1) {
                    row.hide();
                } else {
                    row.show();
                    matchCount++;
                }
            });

            if (matchCount === 0) {
                noResult.show();
            }
            reapplyStriping();
        });
    });
</script>
