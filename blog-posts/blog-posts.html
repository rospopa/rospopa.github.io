<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Pavlo Rospopa Website</title>
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="">
    <link rel="canonical" href="http://rospopa.github.io/">
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/css/favicons/unnamed-180x180.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/css/favicons/unnamed-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/css/favicons/unnamed-32x32.png">
    <link rel="icon" type="image/png" sizes="180x180" href="/css/favicons/unnamed-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/css/favicons/unnamed-192x192.png">
    <link rel="icon" type="image/png" sizes="231x231" href="/css/favicons/unnamed-231x231.png">
    <link href="/feed.xml" type="application/atom+xml" rel="alternate" title="Pavlo Rospopa Website" />
    <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/css/bootstrap.min.css'>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/format.css">
    
<style>
        /* --- 1. BOLD TITLES AND AUTHORS --- */
        table.results tbody tr:not(.summary-row):not(.warning) td {
            font-weight: bold;
        }
        
        .summary-row td {
            font-style: normal;
            color: inherit;
            padding-left: 20px !important;
            border-top: none !important;
            font-weight: normal; 
        }

        /* --- 2. ZEBRA STRIPING --- */
        table.results tbody tr.dynamic-grey > td,
        table.results tbody tr.dynamic-grey > th {
            /* The Color */
            background-color: #f5f5f7 !important;
            
            /* REMOVED: Paint Forcers (caused border glitches) */
            /* will-change: transform; */
            /* transform: scale(1); */
            
            /* The Backup */
            box-shadow: inset 0 0 0 9999px rgba(224, 224, 224, 1) !important;
            -webkit-print-color-adjust: exact;
        }

        /* --- 3. MOUSE HOVER EFFECT --- */
        table.results tbody tr.active-hover > td,
        table.results tbody tr.active-hover > th {
            background-color: #ffff99 !important;
            
            /* REMOVED: Paint Forcers (caused border glitches) */
            /* will-change: transform; */
            /* transform: scale(1); */

            box-shadow: inset 0 0 0 9999px rgba(255, 255, 153, 1) !important;
            cursor: pointer;
        }

        .no-result {
            display: none;
        }
        
        /* Fix for Bootstrap Table Borders interfering with background */
        table.results {
            border-collapse: separate !important; 
            border-spacing: 0;
        }

        /* --- 4. FORCE BLACK BORDERS --- */
        .table-bordered,
        .table-bordered > thead > tr > th,
        .table-bordered > tbody > tr > th,
        .table-bordered > tfoot > tr > th,
        .table-bordered > thead > tr > td,
        .table-bordered > tbody > tr > td,
        .table-bordered > tfoot > tr > td {
            border-color: #555555 !important;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="wrap"><a class="site-title" style="text-decoration: none;" href="https://rospopa.com">Pavlo Rospopa Website</a>
            <nav class="site-nav">
            <div class="trigger">
                <a style="text-decoration: none;" href="/login">Login</a>
            </div>
            <div class="trigger2">
                <a style="text-decoration: none;" href="/login">Login</a>
            </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-content">
            <div class="wrap">
                <div class="home">
                    <div class="form-group pull-right">
                        <input type="text" class="search form-control" placeholder="What you looking for?">
                    </div>
                    <span class="counter pull-right"></span>
                    
                    <table class="table table-bordered results" id="bookTable">
                        <thead>
                            <tr>
                                <th style="width: 5%; min-width: 40px;">#</th>
                                <th style="width: 55%;">Title</th>
                                <th style="width: 40%;">Author</th>
                            </tr>
                            <tr class="warning no-result">
                                <td colspan="4"><i class="fa fa-warning"></i> No result</td>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">1</th>
                                <td>2026 National Industrial Investment Midyear Outlook: Key Takeaways for Investors</td>
                                <td>May 14th, 2026</td>

                        </tbody>
                    </table>
                    
                    <script src='//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
                    
                    <script>
                        $(window).on('load', function() {
                            
                            function reapplyStriping() {
                                $('.results tbody tr').removeClass('dynamic-grey');
                                var visibleBookRows = $('.results tbody tr').not('.summary-row, .warning').filter(':visible');

                                visibleBookRows.each(function(index) {
                                    if (index % 2 !== 0) {
                                        var bookRow = $(this);
                                        var summaryRow = bookRow.next('.summary-row');
                                        bookRow.addClass('dynamic-grey');
                                        summaryRow.addClass('dynamic-grey');
                                    }
                                });
                            }

                            // 1. Initial Apply
                            reapplyStriping();

                            // 2. FORCE REPAINT
                            var table = $('#bookTable');
                            table.hide();
                            setTimeout(function(){
                                table.show(); 
                            }, 10); 


                            // --- NEW: INTELLIGENT HOVER LOGIC ---
                            // Select all rows except the warning row
                            var allRows = $('.results tbody tr').not('.warning');

                            allRows.on('mouseenter', function() {
                                var currentRow = $(this);
                                var partnerRow;

                                if (currentRow.hasClass('summary-row')) {
                                    partnerRow = currentRow.prev();
                                } else {
                                    partnerRow = currentRow.next('.summary-row');
                                }

                                // Add hover class to BOTH
                                currentRow.addClass('active-hover');
                                if (partnerRow.length) partnerRow.addClass('active-hover');
                            });

                            allRows.on('mouseleave', function() {
                                $('.results tbody tr').removeClass('active-hover');
                            });


                            // --- SEARCH LOGIC ---
                            $(".search").keyup(function () {
                                var searchTerm = $(".search").val().toLowerCase();
                                var noResult = $('.no-result');
                                
                                noResult.hide();
                                var matchCount = 0;

                                var bookRows = $('.results tbody tr').not('.summary-row, .warning');

                                bookRows.each(function() {
                                    var bookRow = $(this);
                                    var summaryRow = bookRow.next('.summary-row');
                                    var combinedText = bookRow.text() + " " + summaryRow.text();

                                    if (combinedText.toLowerCase().indexOf(searchTerm) === -1) {
                                        bookRow.hide();
                                        summaryRow.hide();
                                    } else {
                                        bookRow.show();
                                        summaryRow.show();
                                        matchCount++;
                                    }
                                });

                                if (matchCount === 0) {
                                    noResult.show();
                                }

                                reapplyStriping();
                            });
                        });
                    </script>

                    <br><br><br><br><br>
                    Return to <a href="#top">the top of this page</a>.
                    <p></p>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <section class="d-flex flex-row justify-content-center" style="width: 100%;">
            <div class="container" style="margin-right: 0px;margin-left: 0px;padding-right: 0px;padding-left: 0px;width: 100%;max-width: 100%;">
                <div class="row" style="margin-right: 0px;margin-left: 0px;max-width: 100%;padding-top: 20px;padding-bottom: 20px;">
                    <div class="col" style="width: auto;padding-right: 0px;padding-left: 0px;max-width: 100%;">
                        <div class="text-center" style="text-align:center">
                            <p class="mb-0">Copyright © <span id="currentYear"></span> All Rights Reserved.</p>
                            <p style="font-size: 10px; color: #888; margin-top: 5px;">System Version: v2.7</p>
                        </div>
                        <script>
                            document.getElementById('currentYear').textContent = new Date().getFullYear();
                        </script>
                    </div>
                </div>
            </div>
        </section>
    </footer>
</body>
</html>
